name: Auto-Sync Mobile App with Web Updates

on:
  repository_dispatch:
    types:
      - web-app-updated
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-and-build:
    name: Sync and Build Mobile App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout mobile app code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Display trigger information
        run: |
          echo "🔔 Workflow triggered by: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "✅ Web app was updated!"
            echo "Web Commit: ${{ github.event.client_payload.web_version }}"
            echo "Triggered at: ${{ github.event.client_payload.triggered_at }}"
          fi

      - name: Install dependencies
        run: npm install
        continue-on-error: false

      - name: Run linting (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build mobile app
        run: npm run build
        continue-on-error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build
          path: dist/
          retention-days: 5

      - name: Create sync metadata
        if: github.event_name == 'repository_dispatch'
        run: |
          mkdir -p dist
          cat > dist/sync-metadata.json << 'EOF'
          {
            "mobile_version": "${{ github.sha }}",
            "synced_with_web_commit": "${{ github.event.client_payload.web_version }}",
            "sync_triggered_at": "${{ github.event.client_payload.triggered_at }}",
            "web_workflow_run": "${{ github.event.client_payload.workflow_run_id }}",
            "sync_status": "completed"
          }
          EOF
          cat dist/sync-metadata.json

  notify-completion:
    name: Notify Sync Completion
    runs-on: ubuntu-latest
    needs: sync-and-build
    if: always()
    
    steps:
      - name: Report sync status
        run: |
          echo "📱 Mobile App Sync Report"
          echo "=========================="
          if [ "${{ needs.sync-and-build.result }}" == "success" ]; then
            echo "✅ SUCCESS: Mobile app built and synced!"
            echo "🔄 New build ready for deployment"
            echo "📲 Data will auto-sync from Supabase on app launch"
          else
            echo "❌ FAILED: Mobile app sync encountered issues"
            echo "⚠️  Check logs for details"
          fi
